<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaxGrieve Rhinebeck</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        p { text-align: center; color: #7f8c8d; }
        .form-box { margin-top: 30px; }
        input[type="text"] { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 4px; font-size: 18px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #219150; }
        button:disabled { background: #bdc3c7; cursor: not-allowed; }
        #log { margin-top: 30px; background: #2c3e50; color: #ecf0f1; padding: 20px; border-radius: 4px; font-family: monospace; font-size: 13px; height: 200px; overflow-y: auto; display: none; }
        .progress-box { margin-top: 20px; display: none; }
        .timer { font-weight: bold; color: #e67e22; }
        .footer { margin-top: 40px; text-align: center; font-size: 12px; color: #bdc3c7; }
    </style>
</head>
<body>
    <div id="main-container" class="container">
        <h1>TaxGrieve Rhinebeck</h1>
        <p>Enter your address to generate a professional property tax grievance report.</p>
        
        <div class="form-box">
            <input type="text" id="address" placeholder="e.g. 67 N Parsonage St" required>
            <button id="submit-btn" onclick="startAnalysis()">Analyze Property</button>
        </div>

        <div id="progress" class="progress-box">
            <div id="status-msg" style="margin-bottom: 10px; font-weight: bold;">Initializing...</div>
            <div id="timer-msg" class="timer"></div>
        </div>

        <div id="log"></div>

        <div class="footer">
            Built for Rhinebeck Homeowners. Data sourced from Dutchess County ParcelAccess & RapidAPI.
        </div>
    </div>

    <script>
        let eventSource;

        function startAnalysis() {
            const addr = document.getElementById('address').value;
            if (!addr) return alert("Please enter an address");

            document.getElementById('submit-btn').disabled = true;
            document.getElementById('log').style.display = 'block';
            document.getElementById('log').innerHTML = '> Initializing analysis connection...\n';
            document.getElementById('progress').style.display = 'block';

            const formData = new FormData();
            formData.append('address', addr);

            fetch('/report', {
                method: 'POST',
                body: formData
            }).then(response => {
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                function read() {
                    reader.read().then(({ done, value }) => {
                        if (done) return;
                        const chunk = decoder.decode(value);
                        const lines = chunk.split('\n\n');
                        
                        lines.forEach(line => {
                            if (line.startsWith('data: ')) {
                                const data = JSON.parse(line.replace('data: ', ''));
                                handleUpdate(data);
                            }
                        });
                        read();
                    });
                }
                read();
            });
        }

        function handleUpdate(data) {
            const log = document.getElementById('log');
            const status = document.getElementById('status-msg');
            const timer = document.getElementById('timer-msg');

            if (data.status === 'error') {
                status.innerHTML = "❌ Error Occurred";
                status.style.color = "#c0392b";
                log.innerHTML += `<span style="color: #e74c3c;">ERROR: ${data.message}</span>\n`;
                document.getElementById('submit-btn').disabled = false;
            } else if (data.status === 'no_comps') {
                status.innerHTML = "No Comps Found Automatically";
                log.innerHTML += `> Discovery complete, but no matches found.\n`;
                document.getElementById('submit-btn').disabled = false;
                
                // Show Manual Entry Form
                document.getElementById('log').innerHTML = `
                    <div style="background: white; color: #333; padding: 20px; border-radius: 4px; border: 1px solid #ddd; margin-top:10px;">
                        <h3 style="margin-top:0;">🔍 How to Find Comps Manually</h3>
                        <ol style="font-size:14px; line-height:1.5;">
                            <li>Visit <b>Dutchess County ParcelAccess</b>.</li>
                            <li>Search for your address.</li>
                            <li>In the sidebar, click <b>"Search Tools"</b> > <b>"Sales Search"</b>.</li>
                            <li>Set "Sqft Range" to <b>+/- 20%</b> of your home.</li>
                            <li>Identify 3-5 sales and note their <b>Address</b> and <b>Price</b>.</li>
                        </ol>
                        <hr>
                        <form action="/add_comp" method="post">
                            <input type="hidden" name="property_id" value="${data.subject_id}">
                            <p><b>Add a Manual Comp:</b></p>
                            <input type="text" name="address" placeholder="Comp Address" style="width:100%; margin-bottom:10px;" required>
                            <input type="number" name="price" placeholder="Sale Price ($)" style="width:100%; margin-bottom:10px;" required>
                            <button type="submit" style="font-size:14px; background:#34495e;">Add to Record</button>
                        </form>
                    </div>
                `;
            } else if (data.status === 'finished') {
                document.body.innerHTML = data.html;
            } else if (data.status === 'rate_limited') {
                status.innerHTML = "⚠️ Rate Limit Detected";
                startTimer(data.wait, "Resuming in ");
                log.innerHTML += `> ${data.message}\n`;
            } else if (data.status === 'verifying') {
                status.innerHTML = `Verifying Comp ${data.current}/${data.total}`;
                startTimer(2, "Next request in ");
                log.innerHTML += `> ${data.message}\n`;
            } else {
                status.innerHTML = data.status.toUpperCase();
                log.innerHTML += `> ${data.message || data.status}\n`;
            }
            log.scrollTop = log.scrollHeight;
        }

        let currentTimer;
        function startTimer(seconds, prefix) {
            if (currentTimer) clearInterval(currentTimer);
            const timerDisplay = document.getElementById('timer-msg');
            let remaining = seconds;
            
            currentTimer = setInterval(() => {
                timerDisplay.innerHTML = `${prefix} ${remaining}s...`;
                remaining--;
                if (remaining < 0) {
                    clearInterval(currentTimer);
                    timerDisplay.innerHTML = "";
                }
            }, 1000);
        }
    </script>
</body>
</html>
